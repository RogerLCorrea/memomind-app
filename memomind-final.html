'''<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoMind - Organizador de Ideias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #0a0a0f; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(26, 26, 37, 0.95); backdrop-filter: blur(10px); }
        .gradient-purple { background: linear-gradient(135deg, #8b5cf6, #3b82f6); }
        .preview-loading { 
            background: linear-gradient(90deg, #1a1a25 25%, #252532 50%, #1a1a25 75%);
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .modal { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #12121a; 
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 100;
        }
        .modal.open { transform: translateY(0); }
        .overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            opacity: 0; 
            visibility: hidden;
            transition: all 0.3s;
            z-index: 90;
        }
        .overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const DEFAULT_CATEGORIES = [
            { id: 'inbox', name: 'Caixa de Entrada', color: '#6b7280', isDefault: true },
            { id: 'tech', name: 'Tecnologia', color: '#3b82f6' },
            { id: 'business', name: 'Negócios', color: '#8b5cf6' },
            { id: 'health', name: 'Saúde', color: '#10b981' },
            { id: 'finance', name: 'Finanças', color: '#f59e0b' },
            { id: 'entertainment', name: 'Entretenimento', color: '#ec4899' },
            { id: 'learning', name: 'Aprendizado', color: '#06b6d4' },
            { id: 'productivity', name: 'Produtividade', color: '#6366f1' }
        ];
        
        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('memomind_items');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('memomind_categories');
                return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
            });
            
            const [activeCategory, setActiveCategory] = useState('inbox');
            const [searchQuery, setSearchQuery] = useState('');
            const [isAddOpen, setIsAddOpen] = useState(false);
            const [isCategoryOpen, setIsCategoryOpen] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [editingCategory, setEditingCategory] = useState(null);
            const [toast, setToast] = useState(null);
            
            // Estados para novo item
            const [urlInput, setUrlInput] = useState('');
            const [preview, setPreview] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState('inbox');
            const [isLoading, setIsLoading] = useState(false);
            
            // Persistência
            useEffect(() => {
                localStorage.setItem('memomind_items', JSON.stringify(items));
            }, [items]);
            
            useEffect(() => {
                localStorage.setItem('memomind_categories', JSON.stringify(categories));
            }, [categories]);
            
            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };
            
            // FUNÇÃO CORRIGIDA - Detecta URL e gera preview
            const handleUrlChange = async (url) => {
                setUrlInput(url);
                
                if (!url || url.length < 10) {
                    setPreview(null);
                    return;
                }
                
                // Verifica se é uma URL válida
                if (!url.startsWith('http')) {
                    return;
                }
                
                setIsLoading(true);
                
                // Simular processamento
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Detectar tipo de conteúdo
                const urlLower = url.toLowerCase();
                let title, description, image, category;
                
                if (urlLower.includes('youtube.com') || urlLower.includes('youtu.be')) {
                    title = '🎬 Vídeo do YouTube';
                    description = 'Conteúdo em vídeo detectado. Clique para assistir.';
                    image = '🎬';
                    category = 'learning';
                } else if (urlLower.includes('tiktok.com')) {
                    title = '🎵 Vídeo do TikTok';
                    description = 'Conteúdo curto em vídeo. Análise de tendências.';
                    image = '🎵';
                    category = 'entertainment';
                } else if (urlLower.includes('instagram.com')) {
                    title = '📸 Post do Instagram';
                    description = 'Conteúdo visual com legenda e mídia.';
                    image = '📸';
                    category = 'entertainment';
                } else if (urlLower.includes('twitter.com') || urlLower.includes('x.com')) {
                    title = '🐦 Tweet';
                    description = 'Postagem do Twitter/X com possíveis discussões.';
                    image = '🐦';
                    category = 'tech';
                } else if (urlLower.includes('linkedin.com')) {
                    title = '💼 Post do LinkedIn';
                    description = 'Conteúdo profissional e networking.';
                    image = '💼';
                    category = 'business';
                } else {
                    title = '📄 Página Web';
                    description = 'Artigo ou conteúdo de texto detectado.';
                    image = '📄';
                    category = 'inbox';
                    
                    // Detectar por keywords
                    if (urlLower.includes('tech') || urlLower.includes('code')) category = 'tech';
                    if (urlLower.includes('money') || urlLower.includes('invest')) category = 'finance';
                    if (urlLower.includes('health') || urlLower.includes('fitness')) category = 'health';
                }
                
                setPreview({ title, description, image, category });
                setSelectedCategory(category);
                setIsLoading(false);
            };
            
            // Salvar item
            const saveItem = () => {
                if (!urlInput || !preview) {
                    showToast('Cole um link válido primeiro!', 'error');
                    return;
                }
                
                const newItem = {
                    id: Date.now().toString(),
                    url: urlInput,
                    title: preview.title,
                    description: preview.description,
                    image: preview.image,
                    category: selectedCategory,
                    date: new Date().toISOString(),
                    isRead: false
                };
                
                setItems([newItem, ...items]);
                
                // Resetar formulário
                setUrlInput('');
                setPreview(null);
                setSelectedCategory('inbox');
                setIsAddOpen(false);
                
                showToast(`Salvo em ${categories.find(c => c.id === selectedCategory)?.name}!`);
            };
            
            // Gerenciar categorias
            const addCategory = (name, color) => {
                const newCat = { 
                    id: 'cat_' + Date.now(), 
                    name, 
                    color 
                };
                setCategories([...categories, newCat]);
                setEditingCategory(null);
                showToast('Categoria criada!');
            };
            
            const editCategory = (id, name, color) => {
                setCategories(categories.map(c => c.id === id ? { ...c, name, color } : c));
                setEditingCategory(null);
                showToast('Categoria atualizada!');
            };
            
            const deleteCategory = (id) => {
                if (id === 'inbox') {
                    showToast('Não pode excluir Caixa de Entrada!', 'error');
                    return;
                }
                setItems(items.map(item => item.category === id ? { ...item, category: 'inbox' } : item));
                setCategories(categories.filter(c => c.id !== id));
                showToast('Categoria excluída! Itens movidos para Caixa de Entrada.');
            };
            
            // Ações nos itens
            const moveItem = (itemId, newCategory) => {
                setItems(items.map(item => item.id === itemId ? { ...item, category: newCategory } : item));
                setSelectedItem(null);
                showToast('Movido com sucesso!');
            };
            
            const toggleRead = (itemId) => {
                setItems(items.map(item => item.id === itemId ? { ...item, isRead: !item.isRead } : item));
            };
            
            const deleteItem = (itemId) => {
                setItems(items.filter(item => item.id !== itemId));
                setSelectedItem(null);
                showToast('Item excluído');
            };
            
            // Filtrar itens
            const filteredItems = useMemo(() => {
                let filtered = items;
                if (activeCategory !== 'all') {
                    filtered = filtered.filter(item => item.category === activeCategory);
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(item => 
                        item.title.toLowerCase().includes(q) ||
                        item.description.toLowerCase().includes(q)
                    );
                }
                return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [items, activeCategory, searchQuery]);
            
            return (
                <div className="min-h-screen bg-[#0a0a0f]">
                    {/* Header */}
                    <header className="sticky top-0 z-40 glass border-b border-white/10 p-4">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h1 className="text-xl font-bold">MemoMind</h1>
                                    <p className="text-xs text-gray-400">
                                        {items.filter(i => !i.isRead).length} não lidos • {items.length} salvos
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsCategoryOpen(true)} 
                                        className="w-10 h-10 rounded-full bg-[#1a1a25] flex items-center justify-center text-lg">
                                        ⚙️
                                    </button>
                                    <button onClick={() => setIsAddOpen(true)} 
                                        className="w-10 h-10 rounded-full gradient-purple flex items-center justify-center text-2xl">
                                        +
                                    </button>
                                </div>
                            </div>
                            
                            <input
                                type="text"
                                placeholder="Buscar memos..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full px-4 py-3 bg-[#1a1a25] rounded-xl border border-white/10 text-sm"
                            />
                        </div>
                    </header>
                    
                    {/* Categorias */}
                    <div className="sticky top-[120px] z-30 bg-[#0a0a0f] border-b border-white/10 p-4">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex gap-2 overflow-x-auto pb-2">
                                <button onClick={() => setActiveCategory('all')}
                                    className={`px-4 py-2 rounded-full whitespace-nowrap text-sm font-medium ${
                                        activeCategory === 'all' ? 'bg-white text-black' : 'bg-[#1a1a25] text-gray-400'
                                    }`}>
                                    Todos ({items.length})
                                </button>
                                {categories.map(cat => (
                                    <button key={cat.id} onClick={() => setActiveCategory(cat.id)}
                                        className={`px-4 py-2 rounded-full whitespace-nowrap text-sm font-medium flex items-center gap-2 ${
                                            activeCategory === cat.id ? 'bg-[#252532] text-white' : 'bg-[#1a1a25] text-gray-400'
                                        }`}>
                                        <span className="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }} />
                                        {cat.name}
                                        <span className="text-xs opacity-60">
                                            {items.filter(i => i.category === cat.id).length}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* Lista */}
                    <main className="max-w-5xl mx-auto p-4 pb-24">
                        {filteredItems.length === 0 ? (
                            <div className="text-center py-20 text-gray-500">
                                <div className="text-6xl mb-4">📭</div>
                                <p>Nada aqui ainda. Clique no + para adicionar!</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {filteredItems.map(item => (
                                    <div key={item.id} onClick={() => setSelectedItem(item)}
                                        className="bg-[#1a1a25] rounded-xl p-4 border border-white/5 cursor-pointer hover:bg-[#252532] transition-colors relative">
                                        {!item.isRead && (
                                            <span className="absolute top-3 right-3 w-2 h-2 rounded-full" 
                                                style={{ backgroundColor: categories.find(c => c.id === item.category)?.color }} />
                                        )}
                                        <div className="flex gap-4">
                                            <div className="w-16 h-16 rounded-xl bg-[#252532] flex items-center justify-center text-3xl">
                                                {item.image}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-semibold mb-1 truncate">{item.title}</h3>
                                                <p className="text-sm text-gray-400 line-clamp-2 mb-2">{item.description}</p>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs px-2 py-1 rounded-full bg-[#252532]"
                                                        style={{ color: categories.find(c => c.id === item.category)?.color }}>
                                                        {categories.find(c => c.id === item.category)?.name}
                                                    </span>
                                                    <span className="text-xs text-gray-500">
                                                        {new Date(item.date).toLocaleDateString('pt-BR')}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    
                    {/* Modal Adicionar */}
                    {isAddOpen && (
                        <>
                            <div className="overlay show" onClick={() => setIsAddOpen(false)} />
                            <div className="modal open p-6">
                                <div className="w-12 h-1 bg-[#323240] rounded-full mx-auto mb-6" />
                                <h2 className="text-xl font-bold mb-6">Novo Memo</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-sm text-gray-400 mb-2">Cole o link aqui:</label>
                                    <input
                                        type="url"
                                        value={urlInput}
                                        onChange={(e) => handleUrlChange(e.target.value)}
                                        placeholder="https://..."
                                        className="w-full px-4 py-3 bg-[#1a1a25] rounded-xl border border-white/10 text-sm"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        Cole links do YouTube, TikTok, Instagram, etc.
                                    </p>
                                </div>
                                
                                {isLoading && (
                                    <div className="mb-4 p-4 bg-[#1a1a25] rounded-xl preview-loading h-24" />
                                )}
                                
                                {preview && !isLoading && (
                                    <div className="mb-4 p-4 bg-[#1a1a25] rounded-xl border border-white/10">
                                        <div className="flex gap-3">
                                            <div className="text-4xl">{preview.image}</div>
                                            <div className="flex-1">
                                                <h3 className="font-medium mb-1">{preview.title}</h3>
                                                <p className="text-sm text-gray-400">{preview.description}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {preview && (
                                    <div className="mb-6">
                                        <label className="block text-sm text-gray-400 mb-2">Categoria:</label>
                                        <div className="flex flex-wrap gap-2">
                                            {categories.map(cat => (
                                                <button key={cat.id}
                                                    onClick={() => setSelectedCategory(cat.id)}
                                                    className={`px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${
                                                        selectedCategory === cat.id 
                                                            ? 'bg-[#252532] text-white' 
                                                            : 'bg-[#1a1a25] text-gray-400'
                                                    }`}>
                                                    <span className="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }} />
                                                    {cat.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <div className="flex gap-3">
                                    <button onClick={() => setIsAddOpen(false)}
                                        className="flex-1 py-4 rounded-xl bg-[#1a1a25] font-medium">
                                        Cancelar
                                    </button>
                                    <button onClick={saveItem}
                                        disabled={!preview}
                                        className="flex-1 py-4 rounded-xl gradient-purple font-medium disabled:opacity-50">
                                        Salvar
                                    </button>
                                </div>
                            </div>
                        </>
                    )}
                    
                    {/* Modal Categorias */}
                    {isCategoryOpen && (
                        <>
                            <div className="overlay show" onClick={() => setIsCategoryOpen(false)} />
                            <div className="modal open p-6">
                                <div className="w-12 h-1 bg-[#323240] rounded-full mx-auto mb-6" />
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">Categorias</h2>
                                    <button onClick={() => setEditingCategory({ isNew: true })}
                                        className="px-4 py-2 rounded-lg gradient-purple text-sm">
                                        + Nova
                                    </button>
                                </div>
                                
                                <div className="space-y-2 mb-6">
                                    {categories.map(cat => (
                                        <div key={cat.id} className="flex items-center justify-between p-3 bg-[#1a1a25] rounded-xl">
                                            <div className="flex items-center gap-3">
                                                <span className="w-3 h-3 rounded-full" style={{ backgroundColor: cat.color }} />
                                                <span>{cat.name}</span>
                                                <span className="text-xs text-gray-500">
                                                    ({items.filter(i => i.category === cat.id).length})
                                                </span>
                                            </div>
                                            {!cat.isDefault && (
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditingCategory(cat)}
                                                        className="px-3 py-1 rounded bg-[#252532] text-sm">Editar</button>
                                                    <button onClick={() => deleteCategory(cat.id)}
                                                        className="px-3 py-1 rounded bg-red-500/20 text-red-400 text-sm">Excluir</button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                
                                <button onClick={() => setIsCategoryOpen(false)}
                                    className="w-full py-4 rounded-xl bg-[#1a1a25] font-medium">
                                    Fechar
                                </button>
                            </div>
                        </>
                    )}
                    
                    {/* Modal Editar/Criar Categoria */}
                    {editingCategory && (
                        <>
                            <div className="overlay show" onClick={() => setEditingCategory(null)} />
                            <div className="modal open p-6">
                                <div className="w-12 h-1 bg-[#323240] rounded-full mx-auto mb-6" />
                                <h2 className="text-xl font-bold mb-6">
                                    {editingCategory.isNew ? 'Nova Categoria' : 'Editar Categoria'}
                                </h2>
                                
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const name = e.target.name.value;
                                    const color = e.target.color.value;
                                    if (editingCategory.isNew) {
                                        addCategory(name, color);
                                    } else {
                                        editCategory(editingCategory.id, name, color);
                                    }
                                }}>
                                    <div className="mb-4">
                                        <label className="block text-sm text-gray-400 mb-2">Nome:</label>
                                        <input name="name" type="text" defaultValue={editingCategory.name || ''}
                                            placeholder="Ex: Viagens" required
                                            className="w-full px-4 py-3 bg-[#1a1a25] rounded-xl border border-white/10" />
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="block text-sm text-gray-400 mb-2">Cor:</label>
                                        <div className="flex flex-wrap gap-2">
                                            {['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#06b6d4', '#6366f1', '#ef4444', '#84cc16'].map(color => (
                                                <label key={color} className="cursor-pointer">
                                                    <input type="radio" name="color" value={color} 
                                                        defaultChecked={editingCategory.color === color || (!editingCategory.color && color === '#8b5cf6')}
                                                        className="hidden" />
                                                    <div className="w-10 h-10 rounded-full border-2 border-transparent hover:scale-110 transition-transform"
                                                        style={{ backgroundColor: color }} />
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setEditingCategory(null)}
                                            className="flex-1 py-4 rounded-xl bg-[#1a1a25] font-medium">
                                            Cancelar
                                        </button>
                                        <button type="submit"
                                            className="flex-1 py-4 rounded-xl gradient-purple font-medium">
                                            {editingCategory.isNew ? 'Criar' : 'Salvar'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </>
                    )}
                    
                    {/* Modal Detalhes */}
                    {selectedItem && (
                        <>
                            <div className="overlay show" onClick={() => setSelectedItem(null)} />
                            <div className="modal open p-6">
                                <div className="w-12 h-1 bg-[#323240] rounded-full mx-auto mb-6" />
                                
                                <div className="flex items-start justify-between mb-4">
                                    <div className="text-5xl">{selectedItem.image}</div>
                                    <button onClick={() => setSelectedItem(null)} className="text-2xl">×</button>
                                </div>
                                
                                <h2 className="text-xl font-bold mb-2">{selectedItem.title}</h2>
                                <p className="text-gray-400 mb-4">{selectedItem.description}</p>
                                
                                <div className="flex items-center gap-2 mb-6">
                                    <span className="px-3 py-1 rounded-full text-xs"
                                        style={{ 
                                            backgroundColor: `${categories.find(c => c.id === selectedItem.category)?.color}20`,
                                            color: categories.find(c => c.id === selectedItem.category)?.color
                                        }}>
                                        {categories.find(c => c.id === selectedItem.category)?.name}
                                    </span>
                                    <span className="text-xs text-gray-500">
                                        {new Date(selectedItem.date).toLocaleDateString('pt-BR')}
                                    </span>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    <a href={selectedItem.url} target="_blank" rel="noopener noreferrer"
                                        className="flex items-center justify-center gap-2 py-3 rounded-xl bg-[#1a1a25] text-sm font-medium">
                                        🔗 Abrir link
                                    </a>
                                    <button onClick={() => toggleRead(selectedItem.id)}
                                        className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-medium ${
                                            selectedItem.isRead ? 'bg-green-500/20 text-green-400' : 'bg-[#1a1a25]'
                                        }`}>
                                        ✓ {selectedItem.isRead ? 'Lido' : 'Marcar lido'}
                                    </button>
                                </div>
                                
                                <div className="mb-6">
                                    <label className="block text-sm text-gray-400 mb-2">Mover para:</label>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.filter(c => c.id !== selectedItem.category).map(cat => (
                                            <button key={cat.id} onClick={() => moveItem(selectedItem.id, cat.id)}
                                                className="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#1a1a25] text-sm">
                                                <span className="w-2 h-2 rounded-full" style={{ backgroundColor: cat.color }} />
                                                {cat.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <button onClick={() => deleteItem(selectedItem.id)}
                                    className="w-full py-4 rounded-xl border border-red-500/30 text-red-400 font-medium">
                                    🗑️ Excluir memo
                                </button>
                            </div>
                        </>
                    )}
                    
                    {/* Toast */}
                    {toast && (
                        <div className={`fixed bottom-24 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full font-medium text-sm shadow-2xl z-50 ${
                            toast.type === 'error' ? 'bg-red-500' : 'bg-purple-600'
                        } text-white`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }
