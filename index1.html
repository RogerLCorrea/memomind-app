    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        dark: {
                            900: '#0a0a0f',

                            purple: '#8b5cf6',

                            cyan: '#06b6d4',
                            pink: '#ec4899',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',

                        'slide-up': 'slideUp 0.3s ease-out',
                        'fade-in': 'fadeIn 0.2s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },

            background: linear-gradient(90deg, #1a1a25 25%, #252532 50%, #1a1a25 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Bottom sheet para mobile */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #12121a;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 85vh;
            overflow-y: auto;
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 90;
        }
        .overlay.show {
            opacity: 1;

        }

        /* Drag and drop styles */
        .dragging {

            transform: scale(0.95);
        }
        .drag-over {
            background: rgba(139, 92, 246, 0.1);
            border: 2px dashed #8b5cf6;
        }
    </style>
</head>

        // Componente principal
        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('memomind_items');
                return saved ? JSON.parse(saved) : INITIAL_ITEMS;
            });
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('memomind_categories');
                return saved ? JSON.parse(saved) : INITIAL_CATEGORIES;
            });
            const [activeCategory, setActiveCategory] = useState('inbox');
            const [searchQuery, setSearchQuery] = useState('');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [toast, setToast] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [viewMode, setViewMode] = useState('grid'); // 'grid' ou 'list'

            // Persistência
            useEffect(() => {
                localStorage.setItem('memomind_items', JSON.stringify(items));
            }, [items]);

            useEffect(() => {
                localStorage.setItem('memomind_categories', JSON.stringify(categories));
            }, [categories]);

            // Atualizar contadores
            useEffect(() => {
                const newCategories = categories.map(cat => ({
                    ...cat,
                    count: items.filter(item => item.category === cat.id).length
                }));
                setCategories(newCategories);
            }, [items]);

            // Toast helper
            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            // Simular análise de IA
            const analyzeContent = async (url) => {
                setIsAnalyzing(true);

                // Simular delay de processamento
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Lógica simples de detecção baseada na URL
                let detectedCategory = 'inbox';
                let title = 'Conteúdo sem título';
                let summary = 'Não foi possível gerar resumo automático.';
                let type = 'article';
                let source = 'Web';

                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    type = 'video';
                    source = 'YouTube';
                    title = 'Vídeo do YouTube';
                    summary = 'Conteúdo em vídeo detectado. O resumo incluiria transcrição automática dos principais pontos discutidos.';
                    detectedCategory = 'learning';
                } else if (url.includes('tiktok.com')) {
                    type = 'video';
                    source = 'TikTok';
                    title = 'Vídeo do TikTok';
                    summary = 'Conteúdo curto em vídeo. Análise sugere: dica rápida ou entretenimento educativo.';
                    detectedCategory = 'entertainment';
                } else if (url.includes('instagram.com')) {
                    type = 'image';
                    source = 'Instagram';
                    title = 'Post do Instagram';
                    summary = 'Conteúdo visual com legenda. Análise de imagem detectaria texto e contexto visual.';
                    detectedCategory = 'lifestyle';
                } else if (url.includes('news') || url.includes('g1') || url.includes('cnn')) {
                    type = 'article';
                    source = 'Notícias';
                    title = 'Matéria de Notícias';
                    summary = 'Artigo jornalístico detectado. Resumo automático dos fatos principais e contexto.';
                    detectedCategory = 'tech';
                }

                // Simular análise de conteúdo mais profunda
                const keywords = ['investimento', 'dinheiro', 'finanças', 'bitcoin', 'ações'];
                const healthKeywords = ['saúde', 'dieta', 'exercício', 'remédio', 'meditação'];
                const techKeywords = ['programação', 'código', 'software', 'app', 'inteligência artificial'];

                const urlLower = url.toLowerCase();
                if (keywords.some(k => urlLower.includes(k))) detectedCategory = 'finance';
                if (healthKeywords.some(k => urlLower.includes(k))) detectedCategory = 'health';
                if (techKeywords.some(k => urlLower.includes(k))) detectedCategory = 'tech';

                setIsAnalyzing(false);

                return {
                    title,
                    summary,
                    category: detectedCategory,
                    type,
                    source,
                    date: new Date().toISOString(),
                    isRead: false,
                    thumbnail: type === 'video' ? '🎥' : type === 'image' ? '📷' : '📄'
                };
            };

            // Adicionar novo item
            const handleAddItem = async (url) => {
                if (!url.trim()) return;

                const analysis = await analyzeContent(url);
                const newItem = {
                    id: Date.now().toString(),
                    url,
                    ...analysis
                };

                setItems([newItem, ...items]);
                setIsAddModalOpen(false);
                showToast(`Salvo em ${categories.find(c => c.id === analysis.category)?.name || 'Caixa de Entrada'}`, 'success');
            };

            // Mover item entre categorias
            const moveItem = (itemId, newCategory) => {
                setItems(items.map(item => 
                    item.id === itemId ? { ...item, category: newCategory } : item
                ));
                showToast('Movido com sucesso!', 'success');
            };

            // Marcar como lido
            const toggleRead = (itemId) => {
                setItems(items.map(item => 
                    item.id === itemId ? { ...item, isRead: !item.isRead } : item
                ));
            };

            // Deletar item
            const deleteItem = (itemId) => {
                setItems(items.filter(item => item.id !== itemId));
                setSelectedItem(null);
                showToast('Item removido', 'info');
            };

            // Filtrar items
            const filteredItems = useMemo(() => {
                let filtered = items;

                if (activeCategory !== 'all') {
                    filtered = filtered.filter(item => item.category === activeCategory);
                }

                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    filtered = filtered.filter(item => 
                        item.title.toLowerCase().includes(query) ||
                        item.summary.toLowerCase().includes(query) ||
                        item.source.toLowerCase().includes(query)
                    );
                }

                return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [items, activeCategory, searchQuery]);

            // Estatísticas
            const stats = useMemo(() => ({
                total: items.length,
                unread: items.filter(i => !i.isRead).length,
                videos: items.filter(i => i.type === 'video').length,
                articles: items.filter(i => i.type === 'article').length
            }), [items]);

            return (
                <div className="min-h-screen bg-dark-900 text-white font-sans">
                    {/* Header */}
                    <header className="sticky top-0 z-40 glass-strong border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl gradient-purple flex items-center justify-center shadow-lg shadow-purple-500/20">
                                        <Icons.Brain />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-tight">MemoMind</h1>
                                        <p className="text-xs text-gray-400">{stats.unread} não lidos • {stats.total} total</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setIsAddModalOpen(true)}
                                    className="w-12 h-12 rounded-full gradient-purple flex items-center justify-center shadow-lg shadow-purple-500/30 active:scale-95 transition-transform"
                                >
                                    <Icons.Plus />
                                </button>
                            </div>

                            {/* Search Bar */}
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Icons.Search />
                                </div>
                                <input
                                    type="text"
                                    placeholder="Buscar em seus memos..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-10 pr-4 py-3 bg-dark-700 rounded-xl border border-white/10 focus:border-accent-purple focus:outline-none input-glow transition-all text-sm"
                                />
                            </div>
                        </div>
                    </header>

                    {/* Categorias Scroll Horizontal */}
                    <div className="sticky top-[140px] z-30 bg-dark-900/95 backdrop-blur-sm border-b border-white/5 py-3">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" style={{ scrollbarWidth: 'none' }}>
                                <button
                                    onClick={() => setActiveCategory('all')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-full whitespace-nowrap transition-all ${
                                        activeCategory === 'all' 
                                            ? 'bg-white text-dark-900 font-medium' 
                                            : 'bg-dark-700 text-gray-400 hover:bg-dark-600'
                                    }`}
                                >
                                    <Icons.Hash />
                                    Todos
                                    <span className="ml-1 text-xs opacity-60">{stats.total}</span>
                                </button>

                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.id)}
                                        className={`flex items-center gap-2 px-4 py-2 rounded-full whitespace-nowrap transition-all border-l-2 ${
                                            activeCategory === cat.id 
                                                ? 'bg-dark-700 text-white font-medium shadow-lg' 
                                                : 'bg-dark-800 text-gray-400 hover:bg-dark-700'
                                        }`}
                                        style={{ 
                                            borderLeftColor: activeCategory === cat.id ? cat.color : 'transparent',
                                            backgroundColor: activeCategory === cat.id ? `${cat.color}20` : undefined
                                        }}
                                    >
                                        {React.createElement(Icons[cat.icon] || Icons.Hash)}
                                        <span style={{ color: activeCategory === cat.id ? cat.color : undefined }}>
                                            {cat.name}
                                        </span>
                                        {cat.count > 0 && (
                                            <span className="ml-1 text-xs opacity-60">{cat.count}</span>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Conteúdo Principal */}
                    <main className="max-w-7xl mx-auto px-4 py-6 pb-24">
                        {filteredItems.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-500">
                                <div className="w-24 h-24 rounded-full bg-dark-800 flex items-center justify-center mb-4 animate-float">
                                    <Icons.Inbox />
                                </div>
                                <p className="text-lg font-medium">Nada por aqui ainda</p>
                                <p className="text-sm mt-1">Compartilhe links para começar</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <AnimatePresence mode="popLayout">
                                    {filteredItems.map((item, index) => (
                                        <motion.div
                                            key={item.id}
                                            layout
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0, scale: 0.9 }}
                                            transition={{ delay: index * 0.05 }}
                                            onClick={() => setSelectedItem(item)}
                                            className={`group relative bg-dark-800 rounded-2xl p-4 border border-white/5 cursor-pointer card-hover cat-${item.category} ${
                                                !item.isRead ? 'ring-1 ring-accent-purple/30' : ''
                                            }`}
                                        >
                                            {/* Badge de não lido */}
                                            {!item.isRead && (
                                                <div className="absolute top-3 right-3 w-2 h-2 rounded-full bg-accent-purple animate-pulse" />
                                            )}

                                            {/* Thumbnail/Emoji */}
                                            <div className="flex items-start justify-between mb-3">
                                                <div className="w-12 h-12 rounded-xl bg-dark-700 flex items-center justify-center text-2xl">
                                                    {item.thumbnail}
                                                </div>
                                                <div className="flex items-center gap-1 text-xs text-gray-500">
                                                    <Icons.Clock />
                                                    {new Date(item.date).toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' })}
                                                </div>
                                            </div>

                                            {/* Conteúdo */}
                                            <h3 className="font-semibold text-sm mb-2 line-clamp-2 leading-snug">
                                                {item.title}
                                            </h3>
                                            <p className="text-xs text-gray-400 line-clamp-3 mb-3 leading-relaxed">
                                                {item.summary}
                                            </p>

                                            {/* Footer */}
                                            <div className="flex items-center justify-between pt-3 border-t border-white/5">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs px-2 py-1 rounded-full bg-dark-700 text-gray-400">
                                                        {item.source}
                                                    </span>
                                                    <span 
                                                        className="text-xs px-2 py-1 rounded-full"
                                                        style={{ 
                                                            backgroundColor: `${categories.find(c => c.id === item.category)?.color}20`,
                                                            color: categories.find(c => c.id === item.category)?.color
                                                        }}
                                                    >
                                                        {categories.find(c => c.id === item.category)?.name}
                                                    </span>
                                                </div>

                                                {/* Menu rápido */}
                                                <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            toggleRead(item.id);
                                                        }}
                                                        className="p-1.5 rounded-lg hover:bg-dark-700 transition-colors"
                                                    >
                                                        <Icons.Check />
                                                    </button>
                                                </div>
                                            </div>
                                        </motion.div>
                                    ))}
                                </AnimatePresence>
                            </div>
                        )}
                    </main>

                    {/* Modal de Adicionar */}
                    <AnimatePresence>
                        {isAddModalOpen && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    className="overlay show"
                                    onClick={() => !isAnalyzing && setIsAddModalOpen(false)}
                                />
                                <motion.div 
                                    initial={{ y: '100%' }}
                                    animate={{ y: 0 }}
                                    exit={{ y: '100%' }}
                                    transition={{ type: 'spring', damping: 25, stiffness: 300 }}
                                    className="bottom-sheet open"
                                >
                                    <div className="p-6">
                                        <div className="w-12 h-1.5 bg-dark-600 rounded-full mx-auto mb-6" />

                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="w-12 h-12 rounded-xl gradient-cyan flex items-center justify-center">
                                                <Icons.Sparkles />
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-bold">Novo Memo</h2>
                                                <p className="text-sm text-gray-400">Cole qualquer link</p>
                                            </div>
                                        </div>

                                        <form 
                                            onSubmit={(e) => {
                                                e.preventDefault();
                                                const url = e.target.url.value;
                                                handleAddItem(url);
                                                e.target.reset();
                                            }}
                                            className="space-y-4"
                                        >
                                            <div>
                                                <label className="block text-sm font-medium mb-2 text-gray-300">
                                                    Link do conteúdo
                                                </label>
                                                <input
                                                    name="url"
                                                    type="url"
                                                    placeholder="https://..."
                                                    required
                                                    disabled={isAnalyzing}
                                                    className="w-full px-4 py-4 bg-dark-700 rounded-xl border border-white/10 focus:border-accent-cyan focus:outline-none input-glow transition-all"
                                                />
                                                <p className="text-xs text-gray-500 mt-2">
                                                    Funciona com YouTube, TikTok, Instagram, artigos e mais
                                                </p>
                                            </div>

                                            {isAnalyzing && (
                                                <div className="flex items-center gap-3 p-4 bg-dark-700/50 rounded-xl">
                                                    <div className="w-8 h-8 border-2 border-accent-purple border-t-transparent rounded-full animate-spin" />
                                                    <div>
                                                        <p className="text-sm font-medium">Analisando conteúdo...</p>
                                                        <p className="text-xs text-gray-400">Extraindo informações e gerando resumo</p>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex gap-3 pt-4">
                                                <button
                                                    type="button"
                                                    onClick={() => setIsAddModalOpen(false)}
                                                    disabled={isAnalyzing}
                                                    className="flex-1 py-4 rounded-xl bg-dark-700 font-medium active:scale-95 transition-transform disabled:opacity-50"
                                                >
                                                    Cancelar
                                                </button>
                                                <button
                                                    type="submit"
                                                    disabled={isAnalyzing}
                                                    className="flex-1 py-4 rounded-xl gradient-purple font-medium active:scale-95 transition-transform disabled:opacity-50 shadow-lg shadow-purple-500/25"
                                                >
                                                    {isAnalyzing ? 'Analisando...' : 'Salvar'}
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Modal de Detalhes */}
                    <AnimatePresence>
                        {selectedItem && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    className="overlay show"
                                    onClick={() => setSelectedItem(null)}
                                />
                                <motion.div 
                                    initial={{ y: '100%' }}
                                    animate={{ y: 0 }}
                                    exit={{ y: '100%' }}
                                    transition={{ type: 'spring', damping: 25, stiffness: 300 }}
                                    className="bottom-sheet open"
                                >
                                    <div className="p-6 max-h-[85vh] overflow-y-auto">
                                        <div className="w-12 h-1.5 bg-dark-600 rounded-full mx-auto mb-6" />

                                        {/* Header */}
                                        <div className="flex items-start justify-between mb-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-14 h-14 rounded-2xl bg-dark-700 flex items-center justify-center text-3xl">
                                                    {selectedItem.thumbnail}
                                                </div>
                                                <div>
                                                    <span 
                                                        className="text-xs px-2 py-0.5 rounded-full"
                                                        style={{ 
                                                            backgroundColor: `${categories.find(c => c.id === selectedItem.category)?.color}20`,
                                                            color: categories.find(c => c.id === selectedItem.category)?.color
                                                        }}
                                                    >
                                                        {categories.find(c => c.id === selectedItem.category)?.name}
                                                    </span>
                                                    <p className="text-xs text-gray-400 mt-1 flex items-center gap-1">
                                                        <Icons.Clock /> 
                                                        {new Date(selectedItem.date).toLocaleDateString('pt-BR', { 
                                                            day: 'numeric', 
                                                            month: 'long', 
                                                            hour: '2-digit',
                                                            minute: '2-digit'
                                                        })}
                                                    </p>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => setSelectedItem(null)}
                                                className="p-2 rounded-full hover:bg-dark-700 transition-colors"
                                            >
                                                <Icons.X />
                                            </button>
                                        </div>

                                        <h2 className="text-xl font-bold mb-4">{selectedItem.title}</h2>

                                        {/* Resumo */}
                                        <div className="bg-dark-700/50 rounded-xl p-4 mb-6 border border-white/5">
                                            <div className="flex items-center gap-2 mb-2 text-accent-purple">
                                                <Icons.Sparkles />
                                                <span className="text-sm font-medium">Resumo automático</span>
                                            </div>
                                            <p className="text-sm text-gray-300 leading-relaxed">
                                                {selectedItem.summary}
                                            </p>
                                        </div>

                                        {/* Ações */}
                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                            <a 
                                                href={selectedItem.url}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="flex items-center justify-center gap-2 py-3 rounded-xl bg-dark-700 font-medium text-sm active:scale-95 transition-transform"
                                            >
                                                <Icons.ExternalLink />
                                                Ver original
                                            </a>
                                            <button
                                                onClick={() => toggleRead(selectedItem.id)}
                                                className={`flex items-center justify-center gap-2 py-3 rounded-xl font-medium text-sm active:scale-95 transition-transform ${
                                                    selectedItem.isRead ? 'bg-green-500/20 text-green-400' : 'bg-dark-700'
                                                }`}
                                            >
                                                <Icons.Check />
                                                {selectedItem.isRead ? 'Lido' : 'Marcar lido'}
                                            </button>
                                        </div>

                                        {/* Mover categoria */}
                                        <div className="mb-6">
                                            <label className="block text-sm font-medium mb-3 text-gray-400">
                                                Mover para
                                            </label>
                                            <div className="flex flex-wrap gap-2">
                                                {categories.filter(c => c.id !== selectedItem.category).map(cat => (
                                                    <button
                                                        key={cat.id}
                                                        onClick={() => moveItem(selectedItem.id, cat.id)}
                                                        className="flex items-center gap-2 px-3 py-2 rounded-lg bg-dark-700 text-sm hover:bg-dark-600 transition-colors"
                                                    >
                                                        {React.createElement(Icons[cat.icon] || Icons.Hash)}
                                                        {cat.name}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Deletar */}
                                        <button
                                            onClick={() => deleteItem(selectedItem.id)}
                                            className="w-full flex items-center justify-center gap-2 py-4 rounded-xl border border-red-500/30 text-red-400 font-medium text-sm active:scale-95 transition-transform hover:bg-red-500/10"
                                        >
                                            <Icons.Trash2 />
                                            Excluir memo
                                        </button>
                                    </div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Toast */}
                    <div className={`toast ${toast ? 'show' : ''}`}>
                        <div className={`px-6 py-3 rounded-full font-medium text-sm shadow-2xl flex items-center gap-2 ${
                            toast?.type === 'success' ? 'bg-accent-purple text-white' : 
                            toast?.type === 'error' ? 'bg-red-500 text-white' : 
                            'bg-dark-700 text-white border border-white/10'
                        }`}>
                            {toast?.type === 'success' && <Icons.Check />}
                            {toast?.message}
                        </div>
                    </div>

                    {/* Botão flutuante para mobile (quick add) */}
                    <div className="fixed bottom-6 right-6 md:hidden z-40">
                        <button 
                            onClick={() => setIsAddModalOpen(true)}
                            className="w-14 h-14 rounded-full gradient-purple flex items-center justify-center shadow-2xl shadow-purple-500/40 active:scale-90 transition-transform"
                        >
                            <Icons.Plus />
                        </button>
                    </div>
                </div>
            );
        }

        // Renderizar
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
